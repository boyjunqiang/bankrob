<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="你有一分钟，尽可能多捡钱袋，然后逃跑！一款让人上瘾的抢劫小游戏。">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>一分钟劫匪 | One Minute Heist</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="preload" href="./assets/zpix.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: "Zpix";
      src: url("./assets/zpix.woff2") format("woff2");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }

    /* 电脑端扫码卡片样式 */
    #qr-code-card {
      position: absolute;
      top: 32px;
      right: 32px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      z-index: 1000;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    #qr-code-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 0 20px 45px rgba(255, 215, 0, 0.2), 0 15px 40px rgba(0, 0, 0, 0.7);
    }
    #qr-code-card img {
      width: 240px;
      height: 240px;
      border-radius: 12px;
      border: 4px solid #fff;
    }
    #qr-code-card span {
      font-family: "Zpix", "Press Start 2P", monospace;
      font-size: 16px;
      color: #ffd700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      letter-spacing: 1px;
      font-weight: bold;
    }

    /* 电脑端左侧更多游戏提示浮窗 */
    #more-games-card {
      position: absolute;
      top: 32px;
      left: 32px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      z-index: 1000;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    #more-games-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 0 20px 45px rgba(255, 215, 0, 0.2), 0 15px 40px rgba(0, 0, 0, 0.7);
    }
    #more-games-card span.title {
      font-family: "Zpix", "Press Start 2P", monospace;
      font-size: 20px;
      color: #ffd700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      letter-spacing: 1px;
      font-weight: bold;
    }
    #more-games-card span.url {
      font-family: "Zpix", "Press Start 2P", monospace;
      font-size: 32px;
      color: #00ffff;
      text-shadow: 0 3px 12px rgba(0, 255, 255, 0.5);
      letter-spacing: 1.5px;
      font-weight: bold;
    }

    /* 竖屏（如手机）或屏幕过窄时自动隐藏，避免遮挡手机端视线 */
    @media (max-aspect-ratio: 1/1), (max-width: 600px) {
      #qr-code-card, #more-games-card {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <!-- 电脑端左侧更多游戏提示浮窗 -->
  <div id="more-games-card">
    <span class="title">🎮 玩我的更多游戏</span>
    <span class="url">请上 k165.com</span>
  </div>

  <!-- 电脑端扫码玩手机端浮窗 -->
  <div id="qr-code-card">
    <img id="qr-img" src="" alt="QR Code">
    <span>扫码手机游玩 📱</span>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    // 动态根据当前部署 of URL 生成更高清的分辨率二维码（300x300）
    const qrImg = document.getElementById('qr-img');
    if (qrImg) {
      const currentUrl = window.location.href;
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(currentUrl)}&color=0a0a1a&bgcolor=ffffff`;
    }

    // 全局强制全屏 (任何点击都尝试全屏，应对某些移动端浏览器限制)
    const tryFullscreen = () => {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (isMobile && !document.fullscreenElement && !document.webkitFullscreenElement) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      }
    };
    document.body.addEventListener('click', tryFullscreen);
    document.body.addEventListener('touchstart', tryFullscreen, { passive: true });
  </script>
</body>
</html>
